syntax = "proto3";

package Protocol;

/*=================================================
    Envelope
=================================================*/
message Envelope {
  uint32 version    = 1;
  uint32 request_id = 2;
  string auth_token = 3;

  oneof payload {

    // AUTH / LOGIN (10 ~ 29)
    C_CheckId               c_check_id                = 10;
    S_CheckId               s_check_id                = 11;
    C_CheckEmail            c_check_email             = 12;
    S_CheckEmail            s_check_email             = 13;
    C_RequestEmailVerify    c_req_email_verify        = 14;
    S_RequestEmailVerify    s_req_email_verify        = 15;
    C_ConfirmEmailVerify    c_confirm_email_verify    = 16;
    S_ConfirmEmailVerify    s_confirm_email_verify    = 17;
    C_SignUp                c_signup                  = 18;
    S_SignUp                s_signup                  = 19;
    C_Login                 c_login                   = 20;
    S_Login                 s_login                   = 21;
    C_Logout                c_logout                  = 22;
    S_Logout                s_logout                  = 23;
    C_GetMyDevices          c_get_my_devices          = 24;
    S_GetMyDevices          s_get_my_devices          = 25;
    C_RemoveDevice          c_remove_device           = 26;
    S_RemoveDevice          s_remove_device           = 27;

    // MY INFO / SETTINGS (30 ~ 39)
    C_FetchMyInfo           c_fetch_my_info           = 30;
    S_FetchMyInfo           s_fetch_my_info           = 31;
    C_EditMyInfo            c_edit_my_info            = 32;
    S_EditMyInfo            s_edit_my_info            = 33;
    C_RegisterFcmToken      c_register_fcm_token      = 34;
    S_RegisterFcmToken      s_register_fcm_token      = 35;
    C_ChangeEmail           c_change_email            = 36;
    S_ChangeEmail           s_change_email            = 37;
    C_ChangePassword        c_change_password         = 38;
    S_ChangePassword        s_change_password         = 39;

    // CHAT / DATA / FILE (40 ~ 59)
    C_Chat                  c_chat                    = 40;
    S_Chat                  s_chat                    = 41;
    C_Ack                   c_ack                     = 42;
    C_ReqHistory            c_req_history             = 43;
    S_ReqHistory            s_req_history             = 44;
    C_FetchOffline          c_fetch_offline           = 45;
    S_MessageBatch          s_message_batch           = 46;
    C_UploadFile            c_upload_file             = 47;
    S_UploadFile            s_upload_file             = 48;
    C_DeleteMessage         c_delete_message          = 49;
    S_DeleteMessage         s_delete_message          = 50;
    C_EditMessage           c_edit_message            = 51;
    S_EditMessage           s_edit_message            = 52;
    C_GetSubscription       c_get_subscription        = 53;
    S_GetSubscription       s_get_subscription        = 54;
    C_VerifyPurchase        c_verify_purchase         = 55;
    S_VerifyPurchase        s_verify_purchase         = 56;
    C_ReadReceipt           c_read_receipt            = 57;
    S_ReadReceipt           s_read_receipt            = 58;
    C_CancelSubscription    c_cancel_subscription     = 59;
    S_CancelSubscription    s_cancel_subscription     = 103;

    // FRIENDS (60 ~ 79)
    C_SearchUser            c_search_user             = 60;
    S_SearchUser            s_search_user             = 61;
    C_FriendAction          c_friend_action           = 62;
    S_FriendAction          s_friend_action           = 63;
    C_FetchFriendData       c_fetch_friend_data       = 64;
    S_FetchFriendData       s_fetch_friend_data       = 65;
    S_FriendPush            s_friend_push             = 66;

    // BLOCK / REPORT (67 ~ 74)
    C_BlockUser             c_block_user              = 67;
    S_BlockUser             s_block_user              = 68;
    C_UnblockUser           c_unblock_user            = 69;
    S_UnblockUser           s_unblock_user            = 70;
    C_GetBlockedList        c_get_blocked_list        = 71;
    S_GetBlockedList        s_get_blocked_list        = 72;
    C_ReportUser            c_report_user             = 73;
    S_ReportUser            s_report_user             = 74;
    C_AddReaction           c_add_reaction            = 75;
    C_CreatePoll            c_create_poll             = 76;
    C_Vote                  c_vote                    = 77;
    C_ClosePoll             c_close_poll              = 78;
    C_SetAnnouncement       c_set_announcement        = 79;
    S_AddReaction           s_add_reaction            = 104;
    S_CreatePoll            s_create_poll             = 105;
    S_Vote                  s_vote                    = 106;
    S_ClosePoll             s_close_poll              = 107;
    S_SetAnnouncement       s_set_announcement        = 108;

    // GROUPS (80 ~ 99)
    C_CreateGroup           c_create_group            = 80;
    S_CreateGroup           s_create_group            = 81;
    C_GroupList             c_group_list              = 82;
    S_GroupList             s_group_list              = 83;
    C_JoinGroup             c_join_group              = 84;
    S_JoinGroup             s_join_group              = 85;
    C_InviteFriend          c_invite_friend           = 86;
    S_InviteFriend          s_invite_friend           = 87;
    C_LeaveGroup            c_leave_group             = 88;
    S_LeaveGroup            s_leave_group             = 89;
    C_GroupMemberList       c_group_member_list       = 90;
    S_GroupMemberList       s_group_member_list       = 91;
    C_GroupInfo             c_group_info              = 92;
    S_GroupInfo             s_group_info              = 93;
    C_EditGroup             c_edit_group              = 94;
    S_EditGroup             s_edit_group              = 95;
    C_Withdraw              c_withdraw                = 96;
    S_Withdraw              s_withdraw                = 97;
    C_DeleteGroup           c_delete_group            = 98;
    S_DeleteGroup           s_delete_group            = 99;

    // SYSTEM (100 ~ )
    S_Error                 s_error                   = 100;
    C_Heartbeat             c_heartbeat               = 101;
    S_Heartbeat             s_heartbeat               = 102;
  }
}


// UserInfo
message UserInfo {
    string user_id              = 1;
    string name                 = 2;
    string status_message       = 3;
    string profile_image_url    = 4;
    string background_image_url = 5;
    string email                = 6;
    string phone                = 7;
    uint32 sub_grade            = 8;
    int64  storage_capacity_bytes = 9;
    int64  storage_usage_bytes  = 10;
    int64  last_seen            = 11;
    string status               = 12;
}

message DeviceInfo {
    string device_id     = 1;
    string device_name   = 2;
    string platform      = 3;
    int64  last_active   = 4;
    int64  registered_at = 5;
    string app_version   = 6;
    bool   is_current    = 7;
}

/*-------------
    AUTH
---------------*/

message C_CheckId    { string user_id = 1; }
message S_CheckId    { bool is_available = 1; }

message C_CheckEmail { string email = 1; }
message S_CheckEmail { bool is_available = 1; }

message C_RequestEmailVerify { string email = 1; }
message S_RequestEmailVerify {
    bool   success = 1;
    string message = 2;
}

message C_ConfirmEmailVerify {
    string email = 1;
    string code  = 2;
}
message S_ConfirmEmailVerify { bool success = 1; }

message C_SignUp {
    string user_id  = 1;
    string password = 2;
    string name     = 3;
    string email    = 4;
}
message S_SignUp {
    bool   success = 1;
    string message = 2;
    string user_id = 3;
}

message C_Login {
    string user_id  = 1;
    string password = 2;
}
message S_Login {
    bool     success    = 1;
    string   auth_token = 2;
    UserInfo my_info    = 3;
}

message C_Logout {
    string fcm_token = 1;
    string device_id = 2;
}
message S_Logout { bool success = 1; }

message C_GetMyDevices {}
message S_GetMyDevices { repeated DeviceInfo devices = 1; }

message C_RemoveDevice {
    string device_id = 1;
}
message S_RemoveDevice {
    bool   success = 1;
    string message = 2;
}

/*-------------
    MY INFO
---------------*/

message C_FetchMyInfo {}
message S_FetchMyInfo { UserInfo my_info = 1; }

message C_EditMyInfo {
    string name                 = 1;
    string status_message       = 2;
    string profile_image_url    = 3;
    string background_image_url = 4;
    string phone                = 5;
}
message S_EditMyInfo {
    bool     success      = 1;
    string   message      = 2;
    UserInfo updated_info = 3;
}

message C_RegisterFcmToken {
    string fcm_token   = 1;
    string platform    = 2;
    string device_id   = 3;
    string device_name = 4;
    string app_version = 5;
}
message S_RegisterFcmToken {
    bool   success = 1;
    string message = 2;
}

message C_ChangeEmail {
    string new_email = 1;
}
message S_ChangeEmail {
    bool     success      = 1;
    string   message      = 2;
    UserInfo updated_info = 3;
}

message C_ChangePassword {
    string current_password = 1;
    string new_password     = 2;
}
message S_ChangePassword {
    bool   success = 1;
    string message = 2;
}

/*-------------
    CHAT
---------------*/

message Text      { string message = 1; }
message Image     {
    string url       = 1;
    string thumbnail = 2;
    int64  size      = 3;
}
message Video     {
    string url          = 1;
    string thumbnail    = 2;
    int32  duration_sec = 3;
    int64  size         = 4;
}
message File      {
    string url       = 1;
    string filename  = 2;
    int64  size      = 3;
    string mime_type = 4;
}
message SystemMsg {
    string message         = 1;
    int32  type            = 2;
    string invite_group_id = 3;
}

message ChatPayload {
    oneof content {
        Text      text   = 1;
        Image     image  = 2;
        Video     video  = 3;
        File      file   = 4;
        SystemMsg system = 5;
    }
}

message C_Chat {
    string      conv_id              = 1;
    int32       client_msg_id        = 2;
    ChatPayload payload              = 3;
    int64       ts_client            = 4;
    int64       reply_to_seq         = 5;
    string      gcs_path             = 6;
    repeated string mentioned_user_ids = 7;
}

message S_Chat {
    string      conv_id              = 1;
    int32       client_msg_id        = 2;
    int64       msg_seq              = 3;
    string      sender_id            = 4;
    string      sender_name          = 5;
    ChatPayload payload              = 6;
    int64       ts_server            = 7;
    int64       reply_to_seq         = 8;
    string      reply_to_sender_name = 9;
    string      reply_to_text        = 10;
    bool        is_deleted           = 11;
    bool        is_edited            = 12;
    int32       unread_count         = 13;
    int64       file_expires_at      = 14;
    string      file_status          = 15;
    repeated string mentioned_user_ids = 16;
}

message C_ReadReceipt {
    string conv_id       = 1;
    int64  last_read_seq = 2;
}

message S_ReadReceipt {
    string conv_id       = 1;
    string reader_id     = 2;
    int64  last_read_seq = 3;
}

message C_DeleteMessage {
    string conv_id = 1;
    int64  msg_seq = 2;
}
message S_DeleteMessage {
    bool   success = 1;
    string conv_id = 2;
    int64  msg_seq = 3;
}

message C_EditMessage {
    string conv_id  = 1;
    int64  msg_seq  = 2;
    string new_text = 3;
}
message S_EditMessage {
    bool   success   = 1;
    string conv_id   = 2;
    int64  msg_seq   = 3;
    string new_text  = 4;
    int64  edited_at = 5;
}

message C_ReqHistory {
    string conv_id      = 1;
    int64  last_msg_seq = 2;
    int32  limit        = 3;
}
message S_ReqHistory {
    string          conv_id  = 1;
    repeated S_Chat messages = 2;
    bool            is_end   = 3;
}

message C_UploadFile {
    enum UploadType {
        DIRECT_CHAT       = 0;
        GROUP_CHAT        = 1;
        PROFILE_IMG       = 2;
        GROUP_PROFILE_IMG = 3;
        BACKGROUND_IMG    = 4;
    }
    string     filename    = 1;
    int64      size        = 2;
    string     mime_type   = 3;
    bool       is_image    = 4;
    UploadType upload_type = 5;
    string     target_id   = 6;
}
message S_UploadFile {
    bool   success                   = 1;
    string message                   = 2;
    string file_id                   = 3;
    string upload_url                = 4;
    string download_url              = 5;
    string thumb_upload_url          = 6;
    string thumbnail_url             = 7;
    int64  expires_at                = 8;
    string path                      = 9;
    int64  file_retention_expires_at = 10;
}

message C_Ack {
    string conv_id = 1;
    int64  msg_seq = 2;
}

message C_FetchOffline { int64 since_ts = 1; }

message S_MessageBatch {
    message ConversationBatch {
        string          conv_id       = 1;
        repeated S_Chat messages      = 2;
        int32           unread_count  = 3;
        int64           last_read_seq = 4;
    }
    repeated ConversationBatch batches = 1;
}

/*-------------
    SUBSCRIPTION
---------------*/

message C_GetSubscription {}

message SubscriptionPlan {
    int32            plan_id       = 1;
    string           plan_type     = 2;
    string           name          = 3;
    int32            grade         = 4;
    int64            storage_bytes = 5;
    int64            max_file_size = 6;
    int64            monthly_price = 7;
    repeated string  features      = 8;
}

message S_GetSubscription {
    bool                      success                = 1;
    int32                     current_grade          = 2;
    string                    current_plan_name      = 3;
    int64                     storage_capacity_bytes = 4;
    int64                     storage_usage_bytes    = 5;
    int64                     expires_at             = 6;
    bool                      auto_renew             = 7;
    repeated SubscriptionPlan available_plans        = 8;
}

message C_VerifyPurchase {
    string platform       = 1;
    string product_id     = 2;
    string transaction_id = 3;
    string purchase_token = 4;
}
message S_VerifyPurchase {
    bool   success          = 1;
    string message          = 2;
    int32  new_grade        = 3;
    int64  expires_at       = 4;
    int64  storage_capacity = 5;
}

message C_CancelSubscription {}
message S_CancelSubscription {
    bool   success          = 1;
    string message          = 2;
    int64  grace_expires_at = 3;
}

/*-------------
    WITHDRAW
---------------*/

message C_Withdraw {
    string password = 1;
    string reason   = 2;
}
message S_Withdraw {
    bool   success = 1;
    string message = 2;
}

/*-------------
    FRIENDS
---------------*/

message C_SearchUser { string user_id = 1; }
message S_SearchUser {
    bool     success          = 1;
    UserInfo user_info        = 2;
    bool     is_friend        = 3;
    bool     has_sent_request = 4;
}

message FriendRequest {
    UserInfo requester    = 1;
    int64    requested_at = 2;
    bool     is_received  = 3;
}

message C_FriendAction {
    enum ActionType {
        SEND_REQUEST   = 0;
        CANCEL_REQUEST = 1;
        ACCEPT_REQUEST = 2;
        REJECT_REQUEST = 3;
        DELETE_FRIEND  = 4;
    }
    ActionType action         = 1;
    string     target_user_id = 2;
}
message S_FriendAction {
    bool     success        = 1;
    string   message        = 2;
    UserInfo updated_friend = 3;
}

message C_FetchFriendData {}
message S_FetchFriendData {
    repeated UserInfo      friends           = 1;
    repeated FriendRequest received_requests = 2;
    repeated FriendRequest sent_requests     = 3;
}

message S_FriendPush {
    enum PushType {
        NEW_REQUEST = 0;
        ACCEPTED    = 1;
        DELETED     = 2;
    }
    PushType push_type = 1;
    UserInfo user_info = 2;
}

/*-------------
    GROUPS
---------------*/

enum GroupRole {
    MEMBER = 0;
    ADMIN  = 1;
    OWNER  = 2;
}

message GroupMemberInfo {
    UserInfo  user_info = 1;
    GroupRole role      = 2;
    int64     joined_at = 3;
}

message GroupInfo {
    string group_id               = 1;
    string group_name             = 2;
    string group_code             = 3;
    string description            = 4;
    string group_image_url        = 5;
    int32  member_count           = 6;
    int64  storage_capacity_bytes = 7;
    int64  storage_usage_bytes    = 8;
}

message C_CreateGroup    { string group_name = 1; }
message S_CreateGroup    { bool success = 1; GroupInfo group = 2; }

message C_GroupList      {}
message S_GroupList      { repeated GroupInfo groups = 1; }

message C_GroupInfo      { string group_id = 1; }
message S_GroupInfo      { GroupInfo group = 1; GroupRole my_role = 2; }

message C_InviteFriend {
    string          group_id        = 1;
    repeated string friend_user_ids = 2;
}
message S_InviteFriend { bool success = 1; }

message C_JoinGroup   { string group_code = 1; }
message S_JoinGroup   { bool success = 1; GroupInfo group = 2; }

message C_GroupMemberList { string group_id = 1; }
message S_GroupMemberList {
    string                   group_id = 1;
    repeated GroupMemberInfo members  = 2;
}

message C_LeaveGroup  { string group_id = 1; }
message S_LeaveGroup  { bool success = 1; }

message C_EditGroup {
    string group_id        = 1;
    string new_name        = 2;
    string new_description = 3;
    string new_image_url   = 4;
}
message S_EditGroup { bool success = 1; GroupInfo group = 2; }

message C_DeleteGroup { string group_id = 1; }
message S_DeleteGroup { bool success = 1; }

/*-------------
    BLOCK / REPORT
---------------*/

message BlockedUserInfo {
    string user_id     = 1;
    string name        = 2;
    string profile_img = 3;
    int64  blocked_at  = 4;
}

message C_BlockUser   { string target_user_id = 1; }
message S_BlockUser   { bool success = 1; string message = 2; }

message C_UnblockUser { string target_user_id = 1; }
message S_UnblockUser { bool success = 1; }

message C_GetBlockedList {}
message S_GetBlockedList { repeated BlockedUserInfo blocked_users = 1; }

message C_ReportUser {
    string target_user_id = 1;
    string reason         = 2;
    string detail         = 3;
}
message S_ReportUser { bool success = 1; }

/*-------------
    REACTIONS
---------------*/

message C_AddReaction {
    string conv_id = 1;
    int64  msg_seq = 2;
    string emoji   = 3;
}

message S_AddReaction {
    string conv_id = 1;
    int64  msg_seq = 2;
    string user_id = 3;
    string emoji   = 4;
    bool   removed = 5;
}

/*-------------
    POLLS
---------------*/

message C_CreatePoll {
    string          conv_id         = 1;
    string          question        = 2;
    repeated string options         = 3;
    bool            is_multi_select = 4;
    bool            is_anonymous    = 5;
    int64           expires_at      = 6;
}

message S_CreatePoll {
    string          conv_id         = 1;
    string          poll_id         = 2;
    int64           msg_seq         = 3;
    string          creator_id      = 4;
    string          creator_name    = 5;
    string          question        = 6;
    repeated string options         = 7;
    bool            is_multi_select = 8;
    bool            is_anonymous    = 9;
    int64           expires_at      = 10;
    int64           ts_server       = 11;
}

message C_Vote {
    string         conv_id          = 1;
    string         poll_id          = 2;
    int64          msg_seq          = 3;
    repeated int32 selected_options = 4;
}

message S_Vote {
    string         conv_id          = 1;
    string         poll_id          = 2;
    int64          msg_seq          = 3;
    string         voter_id         = 4;
    string         voter_name       = 5;
    repeated int32 selected_options = 6;
    string         votes_json       = 7;
}

message C_ClosePoll {
    string conv_id = 1;
    string poll_id = 2;
    int64  msg_seq = 3;
}

message S_ClosePoll {
    string conv_id = 1;
    string poll_id = 2;
    int64  msg_seq = 3;
}

/*-------------
    ANNOUNCEMENT (공지)
---------------*/
message C_SetAnnouncement {
    string conv_id     = 1;   // "group:xxx" 또는 "direct:targetId"
    int64  msg_seq     = 2;   // 0이면 공지 삭제
    string text        = 3;
    string sender_name = 4;
}

message S_SetAnnouncement {
    string conv_id     = 1;
    int64  msg_seq     = 2;   // 0이면 공지 삭제됨
    string text        = 3;
    string sender_name = 4;
    string setter_id   = 5;   // 공지 설정한 사람
}


/*-------------
    SYSTEM
---------------*/

enum ErrorCode {
    ERR_SUCCESS = 0;

    ERR_UNKNOWN = 1;
    ERR_SERVER_INTERNAL = 2;
    ERR_INVALID_PACKET = 3;
    ERR_VERSION_MISMATCH = 4;
    ERR_UNAUTHORIZED = 5;
    ERR_INVALID_TOKEN = 6;

    ERR_USER_ID_EMPTY = 100;
    ERR_USER_ID_REQUIRED = 101;
    ERR_PASSWORD_REQUIRED = 102;
    ERR_NAME_REQUIRED = 103;
    ERR_EMAIL_REQUIRED = 104;
    ERR_USER_NOT_FOUND = 105;
    ERR_INVALID_PASSWORD = 106;
    ERR_USER_ALREADY_EXISTS = 107;
    ERR_EMAIL_ALREADY_EXISTS = 108;

    ERR_PAYLOAD_EMPTY = 200;
    ERR_INVALID_CONV_ID = 201;
    ERR_INVALID_RECEIVER_ID = 202;
    ERR_INVALID_ACK = 203;

    ERR_INVALID_FRIEND_USER_ID = 300;
    ERR_CANNOT_ADD_SELF = 301;
    ERR_NOT_A_FRIEND = 302;
    ERR_FRIEND_REQUEST_NOT_FOUND = 303;

    ERR_FILE_SERVICE_NOT_INITIALIZED = 400;
    ERR_CLOUD_STORAGE_NOT_INITIALIZED = 401;
    ERR_FILENAME_REQUIRED = 402;
    ERR_INVALID_FILE_SIZE = 403;
    ERR_MIME_TYPE_REQUIRED = 404;
    ERR_FAILED_TO_GENERATE_URL = 405;
    ERR_INVALID_FILE_URL = 406;
    ERR_INVALID_ARGUMENT = 407;
    ERR_STORAGE_EXCEEDED = 408;
    ERR_FILE_TOO_LARGE = 409;
    ERR_PAYMENT_FAILED = 410;
    ERR_RECEIPT_INVALID = 411;

    ERR_NO_PERMISSION = 500;

    ERR_ALREADY_BLOCKED = 600;
    ERR_NOT_BLOCKED = 601;
    ERR_CANNOT_BLOCK_SELF = 602;
    ERR_REPORT_DUPLICATE = 610;

    ERR_POLL_NOT_FOUND = 700;
    ERR_POLL_CLOSED = 701;
    ERR_POLL_INVALID_OPTION = 702;
}

message S_Error {
    ErrorCode error_code = 1;
    uint32    code       = 2;
    string    message    = 3;
}

message C_Heartbeat {}
message S_Heartbeat {}
