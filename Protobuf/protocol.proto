syntax = "proto3";
package Protocol;

message Envelope {
  uint32 version         = 1; // 1버전 고정
  uint64 request_id      = 2; // 요청-응답 매칭(0이면 서버푸시)
  string auth_token      = 3; // 로그인 인증 토큰(JWT 등)
  oneof body {

  // AUTH
    C_SignUp             c_signup             = 10;
    S_SignUp             s_signup             = 11;

    C_Login              c_login              = 20;
    S_Login              s_login              = 21;
    C_JoinDirect         c_join_direct        = 22;
    C_JoinGroup          c_join_group         = 23;
    C_Ack                c_ack                = 24;
    S_Error              s_error              = 25;
    C_Heartbeat          c_heartbeat          = 26;
    S_Heartbeat          s_heartbeat          = 27;


    // Chat, Data(File)
    C_Chat               c_chat               = 30;
    S_Chat               s_chat               = 31;
    C_FetchOffline       c_fetch_offline      = 32;
    S_MessageBatch       s_message_batch      = 33;
    
    C_UploadFile            c_upload_file     = 34;
    S_UploadFile            s_upload_file     = 35;

    // info

    C_FriendList            c_friend_list           = 40;
    S_FriendList            s_friend_list           = 41;

    // Friend Request (50-)
    C_FriendRequest_Find    c_frient_request_find        = 50;
    S_FriendRequest_Find    s_frient_request_find        = 51;

    C_FriendRequest_Add     c_friend_request_add         = 52;
    S_FriendRequest_Add     s_friend_request_add         = 53;
    C_FriendRequest_Cancel  c_friend_request_cancel      = 54;
    S_FriendRequest_Cancel  s_friend_request_cancel      = 55;
    C_FriendRequest_Remove  c_friend_request_remove      = 56;
    S_FriendRequest_Remove  s_friend_request_remove      = 57;
    C_FriendRequest_List    c_friend_request_list        = 58;
    S_FriendRequest_List    s_friend_request_list        = 59;
    C_FriendRequest_Respond c_friend_request_respond     = 60;
    S_FriendRequest_Respond s_friend_request_respond     = 61;
    S_FriendRequest_Push    s_friend_request_push        = 62;  // 서버 푸시

   

   

  }
}

message ChatPayload {
  oneof data {
    TextMsg text   = 1;
    ImageMsg image = 2;
    FileMsg file   = 3;
  }
}

message TextMsg { 
    string message = 1; 
}

message ImageMsg { 
    string url = 1; 
    string thumbnail = 2; 
}

message FileMsg {
    string url = 1; 
    string filename = 2; 
    int64 size = 3; 
}


/* Packet */

// 회원가입
message C_SignUp {
    string user_id = 1;        // 사용자 ID (필수)
    string password = 2;       // 비밀번호 (해, 향후 암호화)
    string name = 3;           // 사용자 이름
    string status_message = 4; // 상태 메시지 (선택)
}

message S_SignUp {
    bool success = 1;
    string message = 2;
    string user_id = 3;        // 생성된 사용자 ID
}


message C_Login {
    string user_id = 1; 
    string password = 2; 
}
message S_Login {
    string user_id = 1; 
    string auth_token = 2; 
}

message C_JoinDirect {
    string peer_user_id = 1; 
}         

message C_JoinGroup  {
    string group_id     = 1; 
}         

message C_Chat {
  string conv_id       = 1;
  int64 client_msg_id = 2;
  ChatPayload payload  = 3; 
  int64  ts_client     = 4;
}

message S_Chat {
  string conv_id       = 1;
  int64 client_msg_id = 2;
  int64 server_msg_id = 3;
  string sender_id     = 4;
  ChatPayload payload  = 5;
  int64  ts_server     = 6;
}



/*-----------------------------
            File Upload
-----------------------------*/

// 파일 업로드 요청
message C_UploadFile {
    string filename = 1;      // 원본 파일명
    int64 size = 2;          // 파일 크기 (bytes)
    string mime_type = 3;    // MIME 타입 (image/jpeg, application/pdf 등)
    bool is_image = 4;       // 이미지 여부 (썸네일 생성 여부 결정)
}

message S_UploadFile {
    bool success = 1;
    string message = 2;
    string file_id = 3;           // 생성된 파일 ID
    string upload_url = 4;        // GCS Signed Upload URL (PUT)
    string download_url = 5;      // GCS Signed Download URL (GET)
    string thumbnail_url = 6;     // 썸네일 다운로드 URL (이미지인 경우)
    int64 expires_at = 7;        // URL 만료 시간 (Unix timestamp)
    string path = 8;          // GCS 경로 (gs://bucket/path)
}




message C_Ack { 
    string conv_id = 1; 
    int64 server_msg_id = 2; 
} // 수신확인/중복제거

message C_FetchOffline {
    int64 since_ts = 1; 
} // 오프라인 메시지 동기화
message S_MessageBatch {
    repeated S_Chat messages = 1; 
}

// 에러 코드 enum (클라이언트-서버 공통)
enum ErrorCode {
    ERR_SUCCESS = 0;              // 성공
    
    // 1~99: 공용/시스템 에러
    ERR_UNKNOWN = 1;              // 알 수 없는 오류
    ERR_SERVER_INTERNAL = 2;      // 서버 내부 로직 에러 (DB 등)
    ERR_INVALID_PACKET = 3;       // 패킷 변조 의심
    ERR_VERSION_MISMATCH = 4;     // 프로토콜 버전 불일치
    ERR_UNAUTHORIZED = 5;         // 인증 실패
    ERR_INVALID_TOKEN = 6;        // 토큰이 유효하지 않음
    
    // 100~199: 인증/사용자 관련
    ERR_USER_ID_EMPTY = 100;      // 사용자 ID가 비어있음
    ERR_USER_ID_REQUIRED = 101;   // 사용자 ID가 필요함
    ERR_PASSWORD_REQUIRED = 102;  // 비밀번호가 필요함
    ERR_NAME_REQUIRED = 103;      // 이름이 필요함
    ERR_USER_NOT_FOUND = 104;     // 사용자를 찾을 수 없음
    ERR_INVALID_PASSWORD = 105;   // 비밀번호가 올바르지 않음
    ERR_USER_ALREADY_EXISTS = 106; // 사용자가 이미 존재함
    
    // 200~299: 채팅 관련
    ERR_PAYLOAD_EMPTY = 200;      // 페이로드가 비어있음
    ERR_INVALID_CONV_ID = 201;    // 대화방 ID가 유효하지 않음
    ERR_INVALID_RECEIVER_ID = 202; // 수신자 ID가 유효하지 않음
    ERR_INVALID_ACK = 203;        // ACK 정보가 유효하지 않음
    
    // 300~399: 친구 요청 관련
    ERR_INVALID_FRIEND_USER_ID = 300; // 친구 사용자 ID가 유효하지 않음
    ERR_CANNOT_ADD_SELF = 301;    // 자신을 친구로 추가할 수 없음
    ERR_NOT_A_FRIEND = 302;       // 친구가 아님
    ERR_FRIEND_REQUEST_NOT_FOUND = 303; // 친구 요청을 찾을 수 없음
    
    // 400~499: 파일 업로드 관련
    ERR_FILE_SERVICE_NOT_INITIALIZED = 400; // 파일 서비스가 초기화되지 않음
    ERR_CLOUD_STORAGE_NOT_INITIALIZED = 401; // 클라우드 스토리지가 초기화되지 않음
    ERR_FILENAME_REQUIRED = 402;  // 파일명이 필요함
    ERR_INVALID_FILE_SIZE = 403;  // 파일 크기가 유효하지 않음
    ERR_MIME_TYPE_REQUIRED = 404;  // MIME 타입이 필요함
    ERR_FAILED_TO_GENERATE_URL = 405; // URL 생성 실패
    ERR_INVALID_FILE_URL = 406;   // 파일 URL이 유효하지 않음
}

message S_Error {
    ErrorCode error_code = 1;      // 에러 코드 (enum)
    uint32 code = 2;                // HTTP 스타일 코드 (하위 호환성)
    string message = 3;             // 에러 메시지
}

message C_Heartbeat {}
message S_Heartbeat {}


/*-----------------------------
            Friends 
-----------------------------*/

message FriendInfo {
    string user_id = 1;
    string name = 2;
    string status_message = 3;
    string profile_image_url = 4;
    int64 last_seen = 5;
    string status = 6;  // "online", "offline", "away"
}

message FriendRequest {
    string requester_user_id = 1;
    string requester_name = 2;
    string requester_status_message = 3;
    string requester_profile_image_url = 4;
    int64 requested_at = 5;
}

// 친구 목록 조회
message C_FriendList {
    // 빈 메시지
}

message S_FriendList {
    repeated FriendInfo friends = 1;
}

// 친구 요청 검색
message C_FriendRequest_Find {
    string user_id = 1;  // 검색할 사용자 ID
}

message S_FriendRequest_Find {
    bool exist = 1;  // 사용자 존재 여부 (error는 그냥 false 처리)
    FriendInfo user_info = 2;  // 사용자 정보 (있으면)
}

// 친구 요청 전송
message C_FriendRequest_Add {
    string friend_user_id = 1;
}

message S_FriendRequest_Add {
    bool success = 1;
    string message = 2;
}

// 친구 요청 취소 (보낸 사람이 취소)
message C_FriendRequest_Cancel {
    string friend_user_id = 1;
}

message S_FriendRequest_Cancel {
    bool success = 1;
    string message = 2;
}

// 이미 보낸 친구 요청 취소 (받은 사람이 취소)
message C_FriendRequest_Remove {
    string friend_user_id = 1;
}

message S_FriendRequest_Remove {
    bool success = 1;
    string message = 2;
}

// 친구 요청 목록 조회
message C_FriendRequest_List {
    enum RequestType {
        RECEIVED = 0;  // 받은 요청
        SENT = 1;      // 보낸 요청
    }
    RequestType type = 1;  // 요청 타입 (기본값: RECEIVED)
}

message S_FriendRequest_List {
    repeated FriendRequest requests = 1;
}

// 친구 요청 수락/거절
message C_FriendRequest_Respond {
    string requester_user_id = 1;
    bool accept = 2;  // true: 수락, false: 거절
}

message S_FriendRequest_Respond {
    bool success = 1;
    string message = 2;
    FriendInfo friend_ = 3;  // 수락 시 친구 정보
}

// 친구 요청 푸시 (서버 -> 클라이언트)
message S_FriendRequest_Push {
    enum EventType {
        REQUEST_RECEIVED = 0;  // 친구 요청 받음
        REQUEST_ACCEPTED = 1;  // 친구 요청 수락됨
        REQUEST_CANCELLED = 2; // 친구 요청 취소됨
    }
    EventType event_type = 1;
    FriendRequest request = 2;  // REQUEST_RECEIVED일 때
    FriendInfo friend = 3;          // REQUEST_ACCEPTED일 때
    string cancelled_user_id = 4; // REQUEST_CANCELLED일 때
}

