syntax = "proto3";
package Protocol;

message Envelope {
  uint32 version         = 1; // 버전 고정
  uint64 request_id      = 2; // 요청-응답 매칭(0이면 서버푸시)
  string auth_token      = 3; // JWT 인증 토큰

  oneof body {
      // AUTH
      C_CheckId               c_check_id                = 10;
      S_CheckId               s_check_id                = 11;
      C_CheckEmail            c_check_email             = 12;
      S_CheckEmail            s_check_email             = 13;

      C_RequestEmailVerify    c_req_email_verify        = 14;
      S_RequestEmailVerify    s_req_email_verify        = 15;
      C_ConfirmEmailVerify    c_confirm_email_verify    = 16;
      S_ConfirmEmailVerify    s_confirm_email_verify    = 17;


      C_SignUp                c_signup                  = 18;
      S_SignUp                s_signup                  = 19;

      //LOGIN
      C_Login                 c_login              = 20;
      S_Login                 s_login              = 21;
      
      C_FetchOffline          c_fetch_offline      = 22;
      S_MessageBatch          s_message_batch      = 23;

      S_Error                 s_error              = 27;
      C_Heartbeat             c_heartbeat          = 28;
      S_Heartbeat             s_heartbeat          = 29;



      // Chat, Data(File)
      C_Chat                  c_chat                = 30;
      S_Chat                  s_chat                = 31;
      C_Ack                   c_ack                 = 32;

      C_ReqHistory            c_req_history         = 33;
      S_ReqHistory            s_req_history         = 34;

      C_UploadFile            c_upload_file         = 35;
      S_UploadFile            s_upload_file         = 36;


      // Freind
      C_SearchUser          c_search_user           = 40;
      S_SearchUser          s_search_user           = 41;
      C_FriendAction        c_friend_action         = 42;
      S_FriendAction        s_friend_action         = 43;
      C_FetchFriendData     c_fetch_friend_data     = 44;
      S_FetchFriendData     s_fetch_friend_data     = 45;
      S_FriendPush          s_friend_push           = 46;
  



      // Group
      C_CreateGroup         c_create_group          = 50;
      S_CreateGroup         s_create_group          = 51;
      C_GroupList           c_group_list            = 52;
      S_GroupList           s_group_list            = 53;
  
      C_JoinGroup           c_join_group            = 54; 
      S_JoinGroup           s_join_group            = 55;


      C_InviteFriend        c_invite_friend         = 56; // 번호는 순서에 맞게
      S_InviteFriend        s_invite_friend         = 57;
  
      C_LeaveGroup          c_leave_group           = 60;
      S_LeaveGroup          s_leave_group           = 61;
  
      C_GroupMemberList     c_group_member_list     = 62;
      S_GroupMemberList     s_group_member_list     = 63;


  }
}




/*-------------
    회원가입 
---------------*/
message C_CheckId {
    string user_id = 1;
}
message S_CheckId {
    bool is_available = 1; 
}

message C_CheckEmail {
    string email = 1;
}
message S_CheckEmail {
    bool is_available = 1; 
}

message C_RequestEmailVerify {
    string email = 1;
}
message S_RequestEmailVerify {
    bool success = 1;
    string message = 2; 
}

message C_ConfirmEmailVerify {
    string email = 1;
    string code = 2;
}
message S_ConfirmEmailVerify {
    bool success = 1;
}

message C_SignUp {
    string user_id = 1;        
    string password = 2;       
    string name = 3;           
    string email = 4; 
}

message S_SignUp {
    bool success = 1;
    string message = 2;
    string user_id = 3;       
}



/*-------------
    로그인 
---------------*/
message C_Login {
    string user_id = 1; 
    string password = 2; 
}


message S_Login {
    string user_id = 1; 
    string auth_token = 2;
    string name = 3;
    string email = 4;
}




/*-------------
    채팅 
---------------*/

message ChatPayload {
  oneof data {
    Text        text   = 1;
    Image       image  = 2;
    Video       video  = 3;
    File        file   = 4;
    SystemMsg   system = 5;
  }
}

message Text { 
    string message = 1; 
}

message Image { 
    string url = 1; 
    string thumbnail = 2; 
}

message Video {
  string    url = 1;
  string    thumbnail = 2; 
  int64     duration_sec = 3; 
}

message File {
    string url = 1; 
    string filename = 2; 
    int64 size = 3; 
    string mime_type = 4;
}

message SystemMsg {
  string message = 1; 
  int32 type = 2;                   // 0: 일반 알림, 1: 초대장(Invite)

  string invite_group_id = 3;   
  string invite_group_code = 4;
  string invite_group_name = 5;
}


message C_Chat {
  string conv_id       = 1;
  int64 client_msg_id = 2;
  ChatPayload payload  = 3; 
  int64  ts_client     = 4;
}

message S_Chat {
  string conv_id        = 1;
  int64 client_msg_id   = 2;
  int64 server_msg_id   = 3;
  string sender_id      = 4;
  string sender_name    = 5;

  ChatPayload payload   = 6;
  int64  ts_server      = 7;
}


message C_ReqHistory {
  string conv_id = 1;
  int64 last_msg_seq = 2; // 클라가 가지고 있는 가장 오래된 메시지 번호
  int32 limit = 3;        // 보통 30~50개
}

message S_ReqHistory {
  string conv_id = 1;
  repeated S_Chat messages = 2;
  bool is_end = 3;                 // 더 옛날 게 남아있는지 여부
}


/*-----------------------------
            File Upload
-----------------------------*/

// 파일 업로드 요청
message C_UploadFile {
    string filename = 1;      // 원본 파일명
    int64 size = 2;          // 파일 크기 (bytes)
    string mime_type = 3;    // MIME 타입 (image/jpeg, application/pdf 등)
    bool is_image = 4;       // 이미지 여부 (썸네일 생성 여부 결정)
}

message S_UploadFile {
    bool success = 1;
    string message = 2;
    string file_id = 3;           // 생성된 파일 ID
    string upload_url = 4;        // GCS Signed Upload URL (PUT)
    string download_url = 5;      // GCS Signed Download URL (GET)
    string thumbnail_url = 6;     // 썸네일 다운로드 URL (이미지인 경우)
    int64 expires_at = 7;        // URL 만료 시간 (Unix timestamp)
    string path = 8;          // GCS 경로 (gs://bucket/path)
}




message C_Ack { 
    string conv_id = 1; 
    int64 server_msg_id = 2; 
} // 수신확인/중복제거

message C_FetchOffline {
    int64 since_ts = 1; 
} // 오프라인 메시지 동기화



message S_MessageBatch {
  message ConversationBatch {
      string conv_id = 1;
      repeated S_Chat messages = 2; // 최신 50개
      int32 unread_count = 3;       // ★ 안 읽은 전체 개수 (배지 표시용)
  }
  repeated ConversationBatch batches = 1;
}



// 에러 코드 enum (클라이언트-서버 공통)
enum ErrorCode {
    ERR_SUCCESS = 0;              // 성공
    
    // 1~99: 공용/시스템 에러
    ERR_UNKNOWN = 1;              // 알 수 없는 오류
    ERR_SERVER_INTERNAL = 2;      // 서버 내부 로직 에러 (DB 등)
    ERR_INVALID_PACKET = 3;       // 패킷 변조 의심
    ERR_VERSION_MISMATCH = 4;     // 프로토콜 버전 불일치
    ERR_UNAUTHORIZED = 5;         // 인증 실패
    ERR_INVALID_TOKEN = 6;        // 토큰이 유효하지 않음
    
    // 100~199: 인증/사용자 관련
    ERR_USER_ID_EMPTY = 100;      // 사용자 ID가 비어있음
    ERR_USER_ID_REQUIRED = 101;   // 사용자 ID가 필요함
    ERR_PASSWORD_REQUIRED = 102;  // 비밀번호가 필요함
    ERR_NAME_REQUIRED = 103;      // 이름이 필요함
    ERR_EMAIL_REQUIRED = 104;      // 이메일이 필요함
    ERR_USER_NOT_FOUND = 105;     // 사용자를 찾을 수 없음
    ERR_INVALID_PASSWORD = 106;   // 비밀번호가 올바르지 않음
    ERR_USER_ALREADY_EXISTS = 107; // 사용자가 이미 존재함
    ERR_EMAIL_ALREADY_EXISTS = 108; // 사용자가 이미 존재함
    
    // 200~299: 채팅 관련
    ERR_PAYLOAD_EMPTY = 200;      // 페이로드가 비어있음
    ERR_INVALID_CONV_ID = 201;    // 대화방 ID가 유효하지 않음
    ERR_INVALID_RECEIVER_ID = 202; // 수신자 ID가 유효하지 않음
    ERR_INVALID_ACK = 203;        // ACK 정보가 유효하지 않음
    
    // 300~399: 친구 요청 관련
    ERR_INVALID_FRIEND_USER_ID = 300; // 친구 사용자 ID가 유효하지 않음
    ERR_CANNOT_ADD_SELF = 301;    // 자신을 친구로 추가할 수 없음
    ERR_NOT_A_FRIEND = 302;       // 친구가 아님
    ERR_FRIEND_REQUEST_NOT_FOUND = 303; // 친구 요청을 찾을 수 없음
    
    // 400~499: 파일 업로드 관련
    ERR_FILE_SERVICE_NOT_INITIALIZED = 400; // 파일 서비스가 초기화되지 않음
    ERR_CLOUD_STORAGE_NOT_INITIALIZED = 401; // 클라우드 스토리지가 초기화되지 않음
    ERR_FILENAME_REQUIRED = 402;  // 파일명이 필요함
    ERR_INVALID_FILE_SIZE = 403;  // 파일 크기가 유효하지 않음
    ERR_MIME_TYPE_REQUIRED = 404;  // MIME 타입이 필요함
    ERR_FAILED_TO_GENERATE_URL = 405; // URL 생성 실패
    ERR_INVALID_FILE_URL = 406;   // 파일 URL이 유효하지 않음
}

message S_Error {
    ErrorCode error_code = 1;      // 에러 코드 (enum)
    uint32 code = 2;                // HTTP 스타일 코드 (하위 호환성)
    string message = 3;             // 에러 메시지
}

message C_Heartbeat {}
message S_Heartbeat {}






/*-----------------------------
            Friends 
-----------------------------*/

message FriendInfo {
    string user_id = 1;
    string name = 2;
    string status_message = 3;
    string profile_image_url = 4;
    int64  last_seen = 5;
    string status = 6;  // "online", "offline", "accepted"
}

message FriendRequest {
  string user_id = 1;
  string name = 2;
  string status_message = 3;
  string profile_image_url = 4;
  int64 requested_at = 5;
  bool  is_received = 6; // true: 받은거, false: 보낸거
}



message C_SearchUser {
  string user_id = 1;           // 검색할 대상 ID
}

message S_SearchUser {
  bool success = 1;
  FriendInfo user_info = 2;     // 찾은 유저 정보
  bool is_friend = 3;           // 이미 친구인지
  bool has_sent_request = 4;    // 이미 요청을 보냈는지
}

// --- 친구 관리 액션 (요청, 수락, 거절, 삭제) ---
message C_FriendAction {
  enum ActionType {
    SEND_REQUEST = 0;
    CANCEL_REQUEST = 1;
    ACCEPT_REQUEST = 2;
    REJECT_REQUEST = 3;
    DELETE_FRIEND = 4;
  }
  ActionType action = 1;
  string target_user_id = 2;
}

message S_FriendAction {
  bool success = 1;
  string message = 2;
  FriendInfo updated_friend = 3; // 수락 시, 새 친구 정보(목록 갱신용)
}



message C_FetchFriendData {
  // 빈 메시지 (토큰으로 식별)
}

message S_FetchFriendData {
  repeated FriendInfo friends = 1;              // 이미 친구인 목록
  repeated FriendRequest received_requests = 2; // 내가 받은 요청
  repeated FriendRequest sent_requests = 3;     // 내가 보낸 요청
}

// --- 실시간 푸시 알림 ---
message S_FriendPush {
  enum PushType {
    NEW_REQUEST = 0;      // 누가 나한테 요청 보냄
    REQUEST_ACCEPTED = 1; // 상대가 내 요청 수락함
    FRIEND_DELETED = 2;   // 친구 삭제됨
  }
  PushType type = 1;
  FriendInfo user_info = 2; // 대상 유저 정보
}



/*-----------------------------
            Groups 
-----------------------------*/

enum GroupRole {
  MEMBER = 0;       // 일반 멤버
  ADMIN = 1;        // 관리자 (가입 승인, 멤버 강퇴 가능)
  OWNER = 2;        // 방장 (그룹 삭제, 스토리지 결제 권한)
}


message GroupInfo {
  string group_id = 1;
  string group_name = 2;
  string group_code = 3;       // 초대 코드
  string description = 4;      // 그룹 설명 (공지사항 등)
  string group_image_url = 5;  // 그룹 대표 이미지
  
  // 멤버 관련
  int32 member_count = 6;
  
  // 공유 스토리지 정보
  int64 storage_capacity_bytes = 7; // 총 용량 (예: 10GB = 10737418240)
  int64 storage_usage_bytes = 8;    // 현재 사용량
}

message GroupMemberInfo {
  string user_id = 1;
  string name = 2;
  string profile_image_url = 3;
  string status_message = 4;
  GroupRole role = 5;          // 이 멤버의 역할
  int64 joined_at = 6;         // 가입일
  int64 last_active_at = 7;    // 마지막 활동 시간 (접속일)
}



 

message C_CreateGroup {
    string group_name   = 1;  // 그룹 이름
}

message S_CreateGroup {
    bool success        = 1;
    string message      = 2;
    GroupInfo group = 3;
}


message C_GroupList {
}

message S_GroupList {
    repeated GroupInfo groups = 1;
}

message C_GroupInfo {
  string group_id = 1;
}

message S_GroupInfo {
  GroupInfo group = 1;
  GroupRole my_role = 2;       // 이 그룹에서 나의 역할
}


message C_InviteFriend {
  string group_id = 1;
  repeated string friend_user_ids = 2; // 여러 명 동시 초대 가능하게
}

message S_InviteFriend {
  bool success = 1;
  string message = 2;
}


message C_JoinGroup {
  string group_code = 1; 
}

message S_JoinGroup {
  bool success = 1;
  string message = 2;
  GroupInfo group = 3; // 성공 시, 바로 방 정보를 줘서 채팅방으로 이동시킴
}



message C_GroupMemberList {
  string group_id = 1;
}

message S_GroupMemberList {
  string group_id = 1;
  repeated GroupMemberInfo members = 2;
}



message C_LeaveGroup {
  string group_id = 1;
}

message S_LeaveGroup {
  bool success = 1;
  string message = 2;
}
